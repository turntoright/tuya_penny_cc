version: 2

sources:
  - name: tuya_raw
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: tuya_raw
    tables:
      - name: raw_devices
      - name: raw_energy_dp_log
      # raw_energy_hourly and raw_energy_daily omitted: statistics-month endpoint
      # returns 1108 on this account; hourly/daily derived from stg_energy_dp_log instead

models:
  - name: stg_devices_latest
    description: "Latest device record per device_id, camelCase renamed to snake_case."
    columns:
      - name: device_id
        tests: [not_null, unique]
      - name: name
        tests: [not_null]
      - name: category
        tests:
          - not_null
          - accepted_values:
              values: ['znjdq', 'dlq']
      - name: is_online
        tests: [not_null]
