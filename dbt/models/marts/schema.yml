version: 2

models:
  - name: dim_devices
    description: "Current state device dimension. parent_device_id is null until topology is established."
    columns:
      - name: device_id
        tests: [not_null, unique]
      - name: name
        tests: [not_null]
      - name: category
        tests:
          - not_null
          - accepted_values:
              values: ['znjdq', 'dlq']
      - name: is_online
        tests: [not_null]
