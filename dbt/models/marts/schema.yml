version: 2

models:
  - name: dim_devices
    description: "Current state device dimension. parent_device_id is null until topology is established."
    columns:
      - name: device_id
        tests: [not_null, unique]
      - name: name
        tests: [not_null]
      - name: category
        tests:
          - not_null
          - accepted_values:
              values: ['znjdq', 'dlq']
      - name: is_online
        tests: [not_null]

  - name: fct_energy_intervals
    description: "Event-level energy consumption per device. One row per add_ele DP change event."
    columns:
      - name: device_id
        tests: [not_null]
      - name: event_ts
        tests: [not_null]
      - name: interval_kwh
        tests: [not_null]
      - name: is_counter_reset
        tests: [not_null]
